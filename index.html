const Tag = ({children, c='gold', xs}) => {

  const [bg,col]=(map[c]||map.gold).split(';');
  return <span style={{display:'inline-block',padding:xs?'1px 6px':'2px 8px',borderRadius:100,fontSize:xs?9:10,fontWeight:600,margin:2,background:bg,color:col}}>{children}</span>;
};

            transition:'all 0.15s',
            boxShadow:active===e.id?`0 0 0 2px ${e.color}22`:undefined,
          }}>
            <div style={{height:4,background:e.color}}/>
            <div style={{padding:'14px 16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                <div>
                  <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:2}}>Etapa {e.num} · {e.rango}</div>
                  <div style={{fontFamily:'Syne',fontSize:13,fontWeight:600,lineHeight:1.2}}>{e.nombre}</div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {e.etapa1&&<span style={{fontSize:9,fontWeight:600,padding:'2px 6px',borderRadius:100,background:'rgba(196,147,58,0.12)',color:'#7A4A0A',whiteSpace:'nowrap'}}>Etapa 1</span>}
                  {e.etapa2&&<span style={{fontSize:9,fontWeight:600,padding:'2px 6px',borderRadius:100,background:'rgba(11,110,79,0.1)',color:'#0B6E4F',whiteSpace:'nowrap'}}>Etapa 2</span>}
                </div>
              </div>
              <div style={{fontSize:10,color:'var(--ink3)',fontStyle:'italic',marginBottom:7,lineHeight:1.4,borderLeft:'2px solid var(--bdr)',paddingLeft:7}}>{e.def}</div>
              <div style={{fontSize:11,color:'var(--ink3)',lineHeight:1.55,marginBottom:10}}>{e.desc}</div>
              <div style={{borderTop:'0.5px solid var(--bdr2)',paddingTop:8}}>
                <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700,color:e.color,lineHeight:1}}>{e.tamano.hogares}</div>
                <div style={{fontSize:10,color:'var(--ink3)',marginTop:2}}>hogares estimados · Lima Met. NSE C</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Detail panel */}
      {et&&(
        <div style={{background:'var(--wh)',border:`0.5px solid ${et.color}44`,borderRadius:12,overflow:'hidden'}}>
          <div style={{padding:'18px 22px',background:'var(--bg2)',borderBottom:'0.5px solid var(--bdr)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',color:et.color,marginBottom:4}}>
                Etapa {et.num} · {et.rango} {et.etapa2?'· Etapa 2 activa':''}
              </div>
              <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700}}>{et.nombre}</div>
            </div>
            <button onClick={()=>setActive(null)} style={{background:'var(--bdr2)',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,color:'var(--ink3)'}}>✕ cerrar</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',background:'var(--wh)'}}>
            {/* Tamaño */}
            <div style={{padding:'16px 18px',borderRight:'0.5px solid var(--bdr)'}}>
              <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:10,paddingBottom:5,borderBottom:'0.5px solid var(--bdr2)'}}>Tamaño del segmento</div>
              <div style={{fontFamily:'Syne',fontSize:28,fontWeight:800,color:et.color,lineHeight:1,marginBottom:3}}>{et.tamano.hogares}</div>
              <div style={{fontSize:11,color:'var(--ink3)',marginBottom:10}}>hogares · Lima Met. NSE C</div>
              <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700,color:'var(--gold)',lineHeight:1,marginBottom:3}}>{et.tamano.personas}</div>
              <div style={{fontSize:11,color:'var(--ink3)',marginBottom:12}}>personas estimadas</div>
              <div style={{padding:'8px 10px',background:'var(--bg2)',borderRadius:7,fontSize:10,color:'var(--ink3)',lineHeight:1.55}}>
                <div style={{fontSize:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:3}}>Base del estimado</div>
                {et.tamano.base}
                <div style={{marginTop:4,fontSize:9,opacity:0.6}}>{et.tamano.fuente}</div>
              </div>
            </div>
            {/* Datos */}
            <div style={{padding:'16px 18px',borderRight:'0.5px solid var(--bdr)'}}>
              <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:10,paddingBottom:5,borderBottom:'0.5px solid var(--bdr2)'}}>Datos públicos del segmento</div>
              {et.datos.map((d,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:et.color,lineHeight:1,marginBottom:2}}>{d.v}</div>
                  <div style={{fontSize:11,color:'var(--ink3)',lineHeight:1.4}}>{d.l}</div>
                </div>
              ))}
            </div>
            {/* Tensión + Producto */}
            <div style={{padding:'16px 18px'}}>
              <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:6,paddingBottom:5,borderBottom:'0.5px solid var(--bdr2)'}}>Tensión central</div>
              <div style={{fontSize:12,color:'var(--ink2)',lineHeight:1.65,marginBottom:14}}>{et.tension}</div>
              <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--ink3)',marginBottom:6,paddingBottom:5,borderBottom:'0.5px solid var(--bdr2)'}}>Plataformas Intercorp relevantes</div>
              <div style={{fontSize:11.5,color:'var(--ink2)',lineHeight:1.65}}>{et.producto}</div>
            </div>
          </div>
        </div>
      )}

      {/* Nota metodológica */}
      <div style={{marginTop:12,padding:'12px 16px',background:'var(--bg2)',borderRadius:8,border:'0.5px solid var(--bdr)',fontSize:11,color:'var(--ink3)',lineHeight:1.65}}>
        <strong style={{color:'var(--ink)'}}>Nota sobre los estimados:</strong> Los tamaños por etapa se calculan aplicando la distribución por grupos de edad de Lima Metropolitana (INEI Censo 2017 + proyecciones 2024) sobre el universo NSE C de Lima Met. (~1.55M hogares, APEIM 2023). Los rangos de etapa de vida son aproximados — no hay una fuente oficial que cruce NSE C × etapa de vida directamente. Los datos de campo corresponden exclusivamente a la etapa Familia Joven (Etapas 1 y 2 del proyecto).
      </div>
    </div>
  );
};

// ── CHAT ──
const SYSTEM_PROMPT = `Eres un asistente de investigación especializado en el proyecto Familias Peruanas de La Victoria Lab para Intercorp. Tienes acceso profundo a todos los datos de la investigación.

CONTEXTO DE LA INVESTIGACIÓN:
- 7 entrevistas en profundidad + encuesta n=278, Lima NSE C, familias con hijos menores de 6 años (Etapa 1, 2025)
- Etapa 2 (2026): Joven Independiente y Nido Vacío

6 ETAPAS DE VIDA:
1. Joven Independiente: sin pareja, sin hijos, autónomo, <40 años
2. Pareja Sin Hijos: con pareja, sin hijos, <45 años
3. Familia Joven: pareja con hijos <6 años (FOCO ETAPA 1)
4. Familia con Experiencia: hijos 6–25 años en casa
5. Nido Vacío: pareja 40–64 años, hijos >18 fuera del hogar (Etapa 2)
6. Adulto Mayor: 65+ años (jubilado o dependiente)

3 CLUSTERS MOTIVACIONALES (encuesta n=278):
- Los cuidadores entregados (45%, n=125): conexión 5.6, autonomía 5.7. Motor: familia y legado. 50% paga con billetera digital. 27% meta familia sana, 25% universidad hijo.
- Los arquitectos del equilibrio (15%, n=42): autonomía 5.7, bienestar 5.0. Motor: equilibrio personal. 57% billetera digital (el más alto). 21% quiere emprender.
- Los inversionistas proactivos (12%, n=34): crecimiento 5.0, autonomía 5.4. Motor: superación personal. 29% tiene préstamo bancario (el más alto). 38% meta: superación constante.
- Resto (28%, n=77): sin perfil diferenciado.

DATOS CLAVE:
- 52% usa billetera digital (Yape/Plin) como pago principal
- 0/7 mencionaron Plin espontáneamente — Yape (Credicorp) ganó el pago cotidiano
- 41% ahorra en banco formal
- 58% tiene alguna deuda activa (22% préstamo bancario)
- 4/7 no tienen red de cuidado activa
- 6/7 nombran universidad del hijo como meta central — solo 8% ahorra activamente para ello
- 7% declara junta activa hoy (penetración histórica es mayor)
- Driver de ahorro #1: miedo al gasto imprevisto en salud (~40%)

METAS Y SUEÑOS:
Universidad del hijo, casa propia, colchón de salud, emprendimiento propio, experiencias familiares, estudios propios inconclusos.

6 OPORTUNIDADES IDENTIFICADAS:
1. Cuenta con propósito (Quick win) — Interbank + Sip + UTP
2. Crédito de propósito fijo desde historial Sip (Adjacent)
3. Consulta médica express en Inkafarma (Adjacent)
4. Pack Sábado Familiar — Cineplanet + Bembos + Sip (Para validar)
5. La junta digital con respaldo formal de Interbank (Disruptiva)
6. Cuidado infantil por horas — habilitador del ecosistema (Disruptiva, LVL)
7. Meet them where they are — principio estratégico cross-plataforma (LVL)
8. Bring joy at home — Cineplanet/Bembos/Casa Andina en el hogar (Disruptiva)

PLATAFORMAS INTERCORP: Retail (Mass, PlazaVea, Real Plaza), Salud (Inkafarma, Clínica Aviva), Finanzas (Interbank, Sip), Educación (UTP, Innova Schools), Entretenimiento (Cineplanet, Bembos, Casa Andina).

SEÑAL COMPETITIVA: Yape = Credicorp (BCP), el principal competidor. Plin = Interbank. Credicorp ganó el pago cotidiano. El territorio de Intercorp está en lo que Yape no puede hacer.

Responde en español. Sé directo, conciso y basado en evidencia. Si algo no está en los datos de la investigación, dilo claramente. No inventes hallazgos.`;

const Chat=()=>{
  const [messages, setMessages]=useState([]);
  const [input, setInput]=useState('');
  const [loading, setLoading]=useState(false);
  const [open, setOpen]=useState(false);
  const bottomRef=React.useRef(null);

  React.useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const send=async()=>{
    const txt=input.trim();
    if(!txt||loading) return;
    setInput('');
    const userMsg={role:'user',content:txt};
    const newMessages=[...messages, userMsg];
    setMessages(newMessages);
    setLoading(true);
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system: SYSTEM_PROMPT,
          messages: newMessages.map(m=>({role:m.role,content:m.content})),
        }),
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||'Sin respuesta.';
      setMessages(prev=>[...prev,{role:'assistant',content:reply}]);
    } catch(e) {
      setMessages(prev=>[...prev,{role:'assistant',content:'Error al conectar. Intenta de nuevo.'}]);
    }
    setLoading(false);
  };

  const suggestions=[
    '¿Cuál es el insight más importante de la investigación?',
    '¿Qué oportunidad tiene mayor impacto para Interbank?',
    '¿Cómo difieren los tres clusters motivacionales?',
    '¿Por qué Plin no aparece en el campo?',
  ];

  return (
    <>
      {/* Floating button */}
      <button onClick={()=>setOpen(o=>!o)} style={{
        position:'fixed',bottom:24,right:24,zIndex:200,
        width:52,height:52,borderRadius:'50%',
        background:'var(--ink)',color:'#FAF8F5',
        border:'none',fontSize:22,
        boxShadow:'0 4px 16px rgba(0,0,0,0.2)',
        transition:'transform 0.15s',
        display:'flex',alignItems:'center',justifyContent:'center',
      }}
        onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
        onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
        title="Preguntar sobre la investigación"
      >
        {open ? '✕' : '💬'}
      </button>

      {/* Chat panel */}
      {open && (
        <div style={{
          position:'fixed',bottom:86,right:24,zIndex:200,
          width:400,height:520,
          background:'var(--wh)',
          border:'0.5px solid var(--bdr)',
          borderRadius:16,
          boxShadow:'0 8px 32px rgba(0,0,0,0.14)',
          display:'flex',flexDirection:'column',
          overflow:'hidden',
        }}>
          {/* Header */}
          <div style={{padding:'14px 18px',borderBottom:'0.5px solid var(--bdr)',background:'var(--bg2)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🔬</div>
            <div>
              <div style={{fontFamily:'Syne',fontSize:13,fontWeight:600}}>Consultar la investigación</div>
              <div style={{fontSize:10,color:'var(--ink3)'}}>Pregunta sobre datos, insights u oportunidades</div>
            </div>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
            {messages.length===0 && (
              <div>
                <div style={{fontSize:12,color:'var(--ink3)',marginBottom:12,lineHeight:1.6}}>
                  Haz preguntas sobre los hallazgos, los segmentos, las oportunidades o cualquier dato de la investigación.
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {suggestions.map((s,i)=>(
                    <button key={i} onClick={()=>{setInput(s);}} style={{
                      background:'var(--bg)',border:'0.5px solid var(--bdr)',
                      borderRadius:8,padding:'8px 12px',
                      fontSize:11,color:'var(--ink2)',textAlign:'left',
                      cursor:'pointer',lineHeight:1.4,
                      transition:'background 0.1s',
                    }}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'}
                      onMouseLeave={e=>e.currentTarget.style.background='var(--bg)'}
                    >
                      {s}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m,i)=>(
              <div key={i} style={{
                display:'flex',
                justifyContent:m.role==='user'?'flex-end':'flex-start',
              }}>
                <div style={{
                  maxWidth:'85%',
                  padding:'9px 13px',
                  borderRadius: m.role==='user'?'12px 12px 3px 12px':'12px 12px 12px 3px',
                  background: m.role==='user'?'var(--ink)':'var(--bg2)',
                  color: m.role==='user'?'#FAF8F5':'var(--ink)',
                  fontSize:12,lineHeight:1.65,
                  whiteSpace:'pre-wrap',
                }}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{display:'flex',justifyContent:'flex-start'}}>
                <div style={{padding:'9px 14px',borderRadius:'12px 12px 12px 3px',background:'var(--bg2)',fontSize:12,color:'var(--ink3)'}}>
                  <span style={{display:'inline-flex',gap:3}}>
                    {[0,1,2].map(i=>(
                      <span key={i} style={{
                        width:6,height:6,borderRadius:'50%',
                        background:'var(--ink3)',
                        display:'inline-block',
                        animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite`,
                      }}/>
                    ))}
                  </span>
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{padding:'10px 12px',borderTop:'0.5px solid var(--bdr)',display:'flex',gap:8,alignItems:'flex-end'}}>
            <textarea
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="Pregunta sobre la investigación..."
              rows={2}
              style={{
                flex:1,resize:'none',border:'0.5px solid var(--bdr)',
                borderRadius:8,padding:'8px 10px',
                fontSize:12,fontFamily:'DM Sans, sans-serif',
                color:'var(--ink)',background:'var(--bg)',
                outline:'none',lineHeight:1.5,
              }}
            />
            <button onClick={send} disabled={!input.trim()||loading} style={{
              width:36,height:36,borderRadius:8,
              background: input.trim()&&!loading?'var(--ink)':'var(--bdr)',
              color: input.trim()&&!loading?'#FAF8F5':'var(--ink3)',
              border:'none',fontSize:16,
              transition:'all 0.15s',flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>↑</button>
          </div>
        </div>
      )}

      <style>{`
        @keyframes bounce {
          0%,80%,100%{transform:translateY(0)}
          40%{transform:translateY(-5px)}
        }
      `}</style>
    </>
  );
};

// ── APP ──
const VIEWS=[{id:'overview',label:'Inicio'},{id:'etapas',label:'Etapas de vida'},{id:'segmentos',label:'Segmentos'},{id:'metas',label:'Metas y sueños'},{id:'insights',label:'Insights'},{id:'oportunidades',label:'Oportunidades'},{id:'plataformas',label:'Deep dive'}];

const App=()=>{
  const [view, setView]=useState('overview');
  const renderView=()=>{
    switch(view){
      case 'overview': return <Overview go={setView}/>;
      case 'etapas': return <EtapasVida/>;
      case 'segmentos': return <Segmentos/>;
      case 'metas': return <Metas/>;
      case 'insights': return <Insights/>;
      case 'oportunidades': return <Oportunidades/>;
      case 'plataformas': return <Plataformas/>;
      default: return <Overview go={setView}/>;
    }
  };
  return (
    <div>
      <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(247,245,241,0.96)',backdropFilter:'blur(12px)',borderBottom:'0.5px solid var(--bdr)',padding:'0 32px',display:'flex',alignItems:'center',gap:0,height:52}}>
        <div style={{fontFamily:'Syne',fontSize:11,fontWeight:600,letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginRight:24,whiteSpace:'nowrap',cursor:'pointer'}} onClick={()=>setView('overview')}>
          LVL <span style={{color:'var(--ink3)'}}>×</span> Intercorp
        </div>
        <div style={{display:'flex',gap:0,flex:1,overflowX:'auto'}}>
          {VIEWS.map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{fontSize:12,fontWeight:400,color:view===v.id?'var(--ink)':'var(--ink3)',padding:'0 14px',height:52,background:'none',border:'none',borderBottom:view===v.id?'2px solid var(--gold)':'2px solid transparent',transition:'all 0.15s',whiteSpace:'nowrap'}}>{v.label}</button>
          ))}
        </div>
        <button onClick={()=>setView('plataformas')} style={{marginLeft:'auto',fontSize:11,fontWeight:600,background:'var(--ink)',color:'#FAF8F5',padding:'6px 14px',borderRadius:6,border:'none',transition:'opacity 0.15s',whiteSpace:'nowrap'}}>Ver plataformas →</button>
      </nav>
      {renderView()}
      <Chat/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
