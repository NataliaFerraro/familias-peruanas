const CiudadView = ({segId}) => {
  const [activeCity, setActiveCity] = useState(null);
  const data = DIFERENCIAS_CIUDAD[segId];
  if(!data) return null;
  const seg = SEGS.find(s=>s.id===segId);

  return (
    <div>
      {/* Header */}
      <div style={{
        padding:'16px 20px',
        background:`${seg?.color}08`,
        borderBottom:'1px solid #E8E0D0',
      }}>
        <div style={{fontFamily:'Fraunces',fontStyle:'italic',fontSize:16,fontWeight:700,color:'#1C1712',marginBottom:4}}>
          {data.titular}
        </div>
        <div style={{fontSize:12,color:'#7A6E5E',lineHeight:1.7,marginBottom:8}}>{data.resumen}</div>
        <div style={{fontSize:9,color:'#7A6E5E',fontStyle:'italic'}}>{data.fuente}</div>
      </div>

      {/* Differences */}
      <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
        {data.diferencias.map((d,i)=>(
          <div key={i} style={{
            border:'1px solid #E8E0D0',borderRadius:8,overflow:'hidden',
            borderLeft: d.critica ? `3px solid ${seg?.color}` : '1px solid #E8E0D0',
          }}>
            <div
              onClick={()=>setActiveCity(activeCity===i?null:i)}
              style={{
                padding:'10px 14px',cursor:'pointer',
                background: activeCity===i ? `${seg?.color}06` : 'white',
                display:'flex',alignItems:'center',gap:10,
                transition:'background 0.12s',
              }}>
              {d.critica&&<span style={{fontSize:11,color:seg?.color}}>⚡</span>}
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:'#1C1712'}}>{d.tema}</div>
                <div style={{display:'flex',gap:8,marginTop:3}}>
                  {d.datos.map((cd,ci)=>(
                    <span key={ci} style={{fontSize:9,fontWeight:600,padding:'1px 6px',borderRadius:100,background:`${cd.color}14`,color:cd.color}}>
                      {cd.ciudad}: {cd.valor.split(' ')[0]}
                    </span>
                  ))}
                </div>
              </div>
              <span style={{color:'#7A6E5E',fontSize:11,flexShrink:0}}>{activeCity===i?'▲':'▼'}</span>
            </div>
            {activeCity===i&&(
              <div style={{borderTop:'1px solid #E8E0D0'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:0}}>
                  {d.datos.map((cd,ci)=>(
                    <div key={ci} style={{
                      padding:'12px 14px',
                      borderRight: ci<2 ? '1px solid #E8E0D0' : 'none',
                      borderBottom:'1px solid #E8E0D0',
                      borderTop:`3px solid ${cd.color}`,
                    }}>
                      <div style={{fontSize:10,fontWeight:700,color:cd.color,marginBottom:3}}>{cd.ciudad}</div>
                      <div style={{fontSize:12,fontWeight:700,color:'#1C1712',marginBottom:3}}>{cd.valor}</div>
                      <div style={{fontSize:10,color:'#7A6E5E',lineHeight:1.4}}>{cd.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:'10px 14px',background:'#FAFAF5'}}>
                  <div style={{fontSize:9,fontWeight:700,color:seg?.color||'#7A6E5E',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}}>

                  </div>
                  <div style={{fontSize:11,color:'#3D3528',lineHeight:1.65}}>{d.lectura}</div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

- TRABAJO: Trujillo JI = 43% negocio propio (el emprendedor domina, Δ26pp vs Arequipa 17%). Lima JI = 39% planilla. Arequipa JI = 41% honorarios/freelance.
- EDUCACIÓN: Arequipa JI = 49% técnico/superior completo. Lima JI = 41%. Trujillo JI = 44% solo secundaria completa (Δ32pp vs Arequipa).
- VIVIENDA: Lima JI = 76% alquila solo. Trujillo JI = 52% alquila + 18% vivienda prestada (casa de familiar). Lima es más solitaria y más cara.
- DRIVER: Trujillo JI = 39% crecimiento (el más concentrado). Arequipa JI = 33% crecimiento + 27% autonomía. Lima más distribuida.
- AHORRO: Lima JI = 54% banco + 10% efectivo en casa. Trujillo JI = 50% banco + 25% efectivo en casa (el doble que Lima).

NIDO VACÍO por ciudad:
- PAGO: Lima NV = 41% billetera digital. Trujillo NV = 77% efectivo. Arequipa NV = 78% efectivo. Brecha: 33pp — la mayor de todo el dataset.
- TRABAJO: Trujillo NV = 59% negocio propio (Δ22pp vs Lima/Arequipa). Lima NV = 38% negocio propio. Arequipa NV = 38% planilla.
- EDUCACIÓN: Trujillo NV = 55% solo secundaria completa (Δ33pp vs Lima/Arequipa con ~47% técnico/superior).
- DRIVER: Lima NV = 26% autonomía. Trujillo NV = 24% crecimiento + 20% legado. Arequipa NV = 25% seguridad (único segmento-ciudad donde seguridad domina).
- QUIÉN APORTA: Lima NV = 58% doble ingreso de pareja. Trujillo NV = 47% solo yo. Arequipa NV = 44% solo yo.
- COBERTURA: Trujillo NV se percibe más cubierto en economía (4.2) y vivienda (4.2) que Lima (4.0/4.1) — a pesar de menor educación formal. El emprendimiento y la propiedad compensan.

IMPLICACIÓN CLAVE: Una estrategia de Sip/Interbank digital que funciona en Lima no funciona en Trujillo o Arequipa — donde el efectivo domina y la confianza digital es significativamente menor. El NV trujillano que habla de "negocio propio" como meta ya tiene uno (59%) — no es aspiración, es identidad.

Responde en español. Cita participantes por nombre cuando tengas evidencia. Diferencia siempre entre segmentos — y entre ciudades cuando los datos lo permiten. Cuando cites el Diario Bot, menciona la fuente y la fecha (abril 2026).`;


const Chat = () => {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[msgs]);

  const send = async () => {
    const t = input.trim();
    if(!t||loading) return;
    setInput('');
    const newMsgs = [...msgs,{role:'user',content:t}];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:SYSTEM,
          messages:newMsgs.map(m=>({role:m.role,content:m.content})),
        }),
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text||'Sin respuesta.';
      setMsgs(prev=>[...prev,{role:'assistant',content:reply}]);
    } catch {
      setMsgs(prev=>[...prev,{role:'assistant',content:'Error de conexión. Intenta de nuevo.'}]);
    }
    setLoading(false);
  };

  const sugs = [
    '¿Cómo difiere el Joven Independiente del Nido Vacío frente a la farmacia?',
    '¿Qué dice el campo sobre la junta digital como mecanismo de ahorro?',
    '¿Cómo varía el rol de la mujer en las compras según la etapa de vida?',
    '¿Por qué Yape ganó y qué territorio le queda a Sip/Plin?',
  ];

  return (
    <>
      <button onClick={()=>setOpen(o=>!o)} style={{
        position:'fixed',bottom:24,right:24,zIndex:300,
        width:52,height:52,borderRadius:12,
        background:'#1C1712',color:'white',border:'none',
        fontSize:22,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',
        transition:'transform 0.15s',display:'flex',alignItems:'center',justifyContent:'center',
      }}
        onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
        onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
      >{open?'✕':'💬'}</button>

      {open&&(
        <div style={{
          position:'fixed',bottom:88,right:24,zIndex:300,
          width:400,height:520,
          background:'white',borderRadius:16,border:'1px solid #E8E0D0',
          display:'flex',flexDirection:'column',
          boxShadow:'0 8px 32px rgba(0,0,0,0.12)',overflow:'hidden',
        }}>
          <div style={{
            padding:'16px 20px',background:'#1C1712',color:'white',
            display:'flex',alignItems:'center',gap:10,
          }}>
            <span style={{fontSize:18}}>🔬</span>
            <div>
              <div style={{fontSize:13,fontWeight:700}}>Consultar la investigación</div>
              <div style={{fontSize:10,opacity:0.5}}>22 entrevistas · n=1,798 encuestados</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:10}}>
            {msgs.length===0&&(
              <div>
                <div style={{fontSize:12,color:'#7A6E5E',marginBottom:12,lineHeight:1.7}}>
                  Pregunta sobre cualquier segmento, plataforma o hallazgo del campo.
                </div>
                {sugs.map((s,i)=>(
                  <button key={i} onClick={()=>setInput(s)} style={{
                    display:'block',width:'100%',textAlign:'left',
                    padding:'10px 14px',marginBottom:8,borderRadius:8,
                    background:'#F7F4EE',border:'1px solid #E8E0D0',
                    fontSize:12,color:'#3D3528',lineHeight:1.5,cursor:'pointer',
                    transition:'background 0.1s',
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background='#EDE8DC'}
                    onMouseLeave={e=>e.currentTarget.style.background='#F7F4EE'}
                  >{s}</button>
                ))}
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{
                  maxWidth:'85%',padding:'10px 14px',borderRadius:10,
                  background:m.role==='user'?'#1C1712':'#F7F4EE',
                  color:m.role==='user'?'white':'#1C1712',
                  fontSize:13,lineHeight:1.65,whiteSpace:'pre-wrap',
                }}>{m.content}</div>
              </div>
            ))}
            {loading&&(
              <div style={{display:'flex',gap:4,padding:'8px'}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{
                    width:6,height:6,borderRadius:'50%',background:'#7A6E5E',
                    animation:`dot 1.2s ${i*0.2}s ease-in-out infinite`,
                  }}/>
                ))}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          <div style={{padding:'12px',borderTop:'1px solid #E8E0D0',display:'flex',gap:8}}>
            <textarea
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="Pregunta sobre el campo..."
              rows={2}
              style={{
                flex:1,resize:'none',border:'1px solid #E8E0D0',
                borderRadius:8,padding:'9px 12px',fontSize:13,
                color:'#1C1712',background:'#FAFAF5',outline:'none',lineHeight:1.5,
              }}
            />
            <button onClick={send} disabled={!input.trim()||loading} style={{
              width:38,height:38,alignSelf:'flex-end',borderRadius:8,
              background:input.trim()&&!loading?'#1C1712':'#E8E0D0',
              color:input.trim()&&!loading?'white':'#7A6E5E',
              border:'none',fontSize:16,transition:'all 0.15s',
            }}>↑</button>
          </div>
        </div>
      )}
      <style>{`@keyframes dot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}`}</style>
    </>
  );
};

/* ── APP ── */
const App = () => {
  const [view, setView] = useState('cover');
  const [activePlat, setActivePlat] = useState(null);
  const plat = PLATS.find(p=>p.id===activePlat);

  const goPlat = id => { setActivePlat(id); setView('platform'); };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* NAV */}
      {view!=='cover'&&(
        <nav style={{
          position:'sticky',top:0,zIndex:200,
          background:'rgba(255,253,248,0.95)',backdropFilter:'blur(12px)',
          borderBottom:'1px solid #E8E0D0',
          padding:'0 48px',display:'flex',alignItems:'center',height:54,
        }}>
          <button onClick={()=>setView('cover')} style={{
            fontSize:13,fontWeight:700,color:'#1C1712',
            background:'none',border:'none',marginRight:24,
            cursor:'pointer',display:'flex',alignItems:'center',gap:8,
            flexShrink:0,
          }}>
            <span style={{fontSize:18}}>←</span>
            <span style={{fontFamily:'Fraunces',fontStyle:'italic'}}>Familias Peruanas</span>
          </button>
          {/* Motivacionales link */}
          <button onClick={()=>setView('motivacionales')} style={{
            padding:'0 14px',height:54,fontSize:11,fontWeight:700,
            color:view==='motivacionales'?'#E85D04':'#7A6E5E',
            background:'none',border:'none',
            borderBottom:view==='motivacionales'?'3px solid #E85D04':'3px solid transparent',
            transition:'all 0.15s',whiteSpace:'nowrap',marginRight:8,flexShrink:0,
            display:'flex',alignItems:'center',gap:5,
          }}>
            <span>◐</span> Segmentos motivacionales
          </button>
          <div style={{width:'1px',height:24,background:'#E8E0D0',marginRight:8,flexShrink:0}}/>
          <div style={{display:'flex',gap:2,flex:1,overflowX:'auto'}}>
            {PLATS.map(p=>(
              <button key={p.id} onClick={()=>goPlat(p.id)} style={{
                padding:'0 14px',height:54,fontSize:12,fontWeight:600,
                color:activePlat===p.id&&view==='platform'?p.color:'#7A6E5E',
                background:'none',border:'none',
                borderBottom:activePlat===p.id&&view==='platform'?`3px solid ${p.color}`:'3px solid transparent',
                transition:'all 0.15s',whiteSpace:'nowrap',
                display:'flex',alignItems:'center',gap:5,
              }}>
                <span>{p.emoji}</span>{p.nombre}
              </button>
            ))}
          </div>
        </nav>
      )}

      {view==='cover'&&<Cover onStart={()=>goPlat('salud')} onMot={()=>setView('motivacionales')}/>}
      {view==='motivacionales'&&<SegMotView/>}
      {view==='platform'&&plat&&<PlatformView plat={plat}/>}

      <Chat/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
