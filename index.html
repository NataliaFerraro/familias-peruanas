};

  const platOpps=OPPS.filter(o=>o.plat.toLowerCase().includes(plat==='finanzas'?'interbank':plat==='edu'?'utp':plat==='salud'?'inkafarma':plat==='entret'?'cineplanet':plat));

  return (
    <div style={{maxWidth:960,margin:'0 auto',padding:'40px 32px 80px'}}>
      <Eyebrow label="Deep Dive · Plataformas del Grupo"/>
      <div style={{fontFamily:'Syne',fontSize:26,fontWeight:700,marginBottom:8}}>Por plataforma</div>
      <div style={{fontSize:13,color:'var(--ink3)',marginBottom:20}}>Selecciona una plataforma para ver insights y oportunidades específicas para ese equipo.</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
        {plats.map(p=>(
          <button key={p.id} onClick={()=>{setPlat(p.id);setOpenIns(null);}} style={{padding:'7px 14px',borderRadius:100,fontSize:12,fontWeight:500,border:plat===p.id?'none':'0.5px solid var(--bdr)',background:plat===p.id?p.c:'var(--wh)',color:plat===p.id?'#FAF8F5':'var(--ink3)',transition:'all 0.15s'}}>{p.label} · {p.sub}</button>
        ))}
      </div>
      <div style={{borderRadius:12,padding:'22px 26px',marginBottom:14,background:current.c,color:'#FAF8F5'}}>
        <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'2px',opacity:0.6,marginBottom:4}}>Deep dive · {current.label}</div>
        <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700,marginBottom:8}}>{current.sub}</div>
        <div style={{fontSize:12,opacity:0.75,lineHeight:1.6}}>{current.headline}</div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--ink3)',marginBottom:10}}>Insights relevantes</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {platInsights.map(i=>(
            <div key={i.id} style={{background:'var(--wh)',border:'0.5px solid var(--bdr)',borderRadius:10,overflow:'hidden'}}>
              <div onClick={()=>setOpenIns(openIns===i.id?null:i.id)} style={{padding:'12px 16px',borderBottom:openIns===i.id?'0.5px solid var(--bdr)':undefined,background:'var(--bg)',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--ink3)',minWidth:20}}>{i.num}</div>
                <div style={{fontSize:13,fontWeight:500,color:'var(--ink)',flex:1,fontStyle:'italic'}}>"{i.title}"</div>
                <Tag xs>{i.conf}</Tag>
                <div style={{fontSize:14,color:'var(--ink3)',transition:'transform 0.2s',transform:openIns===i.id?'rotate(180deg)':'none'}}>⌄</div>
              </div>
              {openIns===i.id&&(
                <div style={{padding:'14px 16px'}}>
                  <div style={{fontSize:12,color:'var(--ink2)',lineHeight:1.65,marginBottom:8}}>{i.desc}</div>
                  {i.quotes.map((q,qi)=>(
                    <div key={qi} style={{borderLeft:'2px solid var(--gold)',padding:'4px 10px',fontStyle:'italic',fontSize:11,color:'var(--ink3)',background:'rgba(196,147,58,0.04)',borderRadius:'0 4px 4px 0',marginBottom:6}}>{q}</div>
                  ))}
                  <div style={{padding:'9px 12px',background:'rgba(196,147,58,0.06)',borderLeft:'3px solid var(--gold)',borderRadius:'0 6px 6px 0',marginTop:8}}>
                    <div style={{fontSize:8.5,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--gold)',marginBottom:3}}>Deeper truth</div>
                    <div style={{fontSize:12,color:'var(--ink2)',lineHeight:1.6}}>{i.deeper}</div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      {platOpps.length>0&&(
        <div>
          <div style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--ink3)',marginBottom:10}}>Oportunidades para esta plataforma</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
            {platOpps.map(o=>(
              <div key={o.id} style={{background:'var(--wh)',border:'0.5px solid var(--bdr)',borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:8.5,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--gold)',marginBottom:4}}>{o.tipo}</div>
                <div style={{fontSize:13,fontWeight:500,color:'var(--ink)',marginBottom:6,lineHeight:1.3}}>{o.titulo}</div>
                <div style={{fontSize:11.5,color:'var(--ink2)',lineHeight:1.6,marginBottom:8}}>{o.desc}</div>
                <Tag xs>{o.segs}</Tag>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ── APP ──
const VIEWS=[{id:'overview',label:'Inicio'},{id:'segmentos',label:'Segmentos'},{id:'metas',label:'Metas y sueños'},{id:'insights',label:'Insights'},{id:'oportunidades',label:'Oportunidades'},{id:'plataformas',label:'Deep dive'}];

const App=()=>{
  const [view, setView]=useState('overview');
  const renderView=()=>{
    switch(view){
      case 'overview': return <Overview go={setView}/>;
      case 'segmentos': return <Segmentos/>;
      case 'metas': return <Metas/>;
      case 'insights': return <Insights/>;
      case 'oportunidades': return <Oportunidades/>;
      case 'plataformas': return <Plataformas/>;
      default: return <Overview go={setView}/>;
    }
  };
  return (
    <div>
      <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(247,245,241,0.96)',backdropFilter:'blur(12px)',borderBottom:'0.5px solid var(--bdr)',padding:'0 32px',display:'flex',alignItems:'center',gap:0,height:52}}>
        <div style={{fontFamily:'Syne',fontSize:11,fontWeight:600,letterSpacing:'2px',textTransform:'uppercase',color:'var(--gold)',marginRight:24,whiteSpace:'nowrap',cursor:'pointer'}} onClick={()=>setView('overview')}>
          LVL <span style={{color:'var(--ink3)'}}>×</span> Intercorp
        </div>
        <div style={{display:'flex',gap:0,flex:1,overflowX:'auto'}}>
          {VIEWS.map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{fontSize:12,fontWeight:400,color:view===v.id?'var(--ink)':'var(--ink3)',padding:'0 14px',height:52,background:'none',border:'none',borderBottom:view===v.id?'2px solid var(--gold)':'2px solid transparent',transition:'all 0.15s',whiteSpace:'nowrap'}}>{v.label}</button>
          ))}
        </div>
        <button onClick={()=>setView('plataformas')} style={{marginLeft:'auto',fontSize:11,fontWeight:600,background:'var(--ink)',color:'#FAF8F5',padding:'6px 14px',borderRadius:6,border:'none',transition:'opacity 0.15s',whiteSpace:'nowrap'}}>Ver plataformas →</button>
      </nav>
      {renderView()}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
